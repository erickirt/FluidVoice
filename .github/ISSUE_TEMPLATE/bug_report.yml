name: Bug Report
description: Report a reproducible FluidVoice bug.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If you are unsure whether this is a FluidVoice bug, please start a Discussion first:
        https://github.com/altic-dev/FluidVoice/discussions
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Briefly describe what is broken.
      placeholder: FluidVoice crashes when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide exact steps a maintainer can follow.
      placeholder: |
        1. Open FluidVoice
        2. Configure...
        3. Press...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: "1.2.3"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "macOS 15.5"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon
        - Intel
        - Unknown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Paste relevant logs or crash output when available.
      render: text
    validations:
      required: false
  - type: upload
    id: media
    attributes:
      label: Screenshots or screen recording
      description: Attach screenshots or a recording if they help explain the bug.
    validations:
      required: false
